name: Release

on:
  push:
    tags:
      - "v*"
  # Build the packages on demand (uploaded as run artifacts only; no GitHub
  # Release is published unless the run was triggered by a v* tag).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-x64
            bin: ralphy.exe
            archive: zip
          - os: ubuntu-latest
            target_name: linux-x64
            bin: ralphy
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin ralphy

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="$(git describe --tags --always)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=ralphy-$version-${{ matrix.target_name }}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          name="${{ steps.version.outputs.name }}"
          stage="dist/$name"
          mkdir -p "$stage" out
          # The binary embeds its prompts and skills at build time, so it is
          # self-contained — these are the docs a user needs alongside it.
          cp "target/release/${{ matrix.bin }}" "$stage/"
          cp README.md LICENSE docs/BUILDING.md "$stage/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ( cd dist && 7z a -tzip "../out/$name.zip" "$name" >/dev/null )
            archive="$name.zip"
          else
            # tar preserves the executable bit so the user can run it directly.
            tar -czf "out/$name.tar.gz" -C dist "$name"
            archive="$name.tar.gz"
          fi
          ( cd out && sha256sum "$archive" > "$archive.sha256" )
          ls -l out

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target_name }}
          path: out/

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/}"
          ls -l out
          gh release create "$version" out/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$version" \
            --generate-notes
