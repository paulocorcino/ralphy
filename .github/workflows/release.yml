name: Release

on:
  push:
    tags:
      - "v*"
  # Build the packages on demand (uploaded as run artifacts only; no GitHub
  # Release is published unless the run was triggered by a v* tag).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-x64
            target: x86_64-pc-windows-msvc
            bin: ralphy.exe
            archive: zip
          - os: ubuntu-latest
            target_name: linux-x64
            # Static musl build: no glibc dependency, so the released binary runs
            # on any Linux distro (the default glibc build floors at the runner's
            # glibc, e.g. 2.39 on ubuntu-latest, and fails on older LTS releases).
            target: x86_64-unknown-linux-musl
            bin: ralphy
            archive: tar.gz
          # Both macOS arches build on the Apple Silicon runner (macos-14): arm64
          # natively, x86_64 by cross-compile (Apple clang cross-compiles out of
          # the box, no extra deps). This avoids the scarce/retiring macos-13 Intel
          # runner, whose queue stalls the whole release.
          # MACOSX_DEPLOYMENT_TARGET=12.0 floors compatibility at macOS 12 Monterey.
          - os: macos-14
            target_name: macos-x64
            target: x86_64-apple-darwin
            macos_min: "12.0"
            bin: ralphy
            archive: tar.gz
          - os: macos-14
            target_name: macos-arm64
            target: aarch64-apple-darwin
            macos_min: "12.0"
            bin: ralphy
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl build tools
        if: runner.os == 'Linux'
        # musl-gcc, picked up by cc-rs to compile the bundled C deps (sqlite, ring)
        # against musl.
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # MACOSX_DEPLOYMENT_TARGET is read by the Apple linker to set the binary's
        # minimum-OS load command; empty (and so ignored) on Windows/Linux.
        # CC_x86_64_unknown_linux_musl points cc-rs at the wrapper Ubuntu's
        # musl-tools actually installs (`musl-gcc`), not the prefixed name cc-rs
        # probes by default (`x86_64-linux-musl-gcc`), so the bundled C deps
        # (sqlite, ring) compile. Ignored on the Windows/macOS targets.
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_min }}
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --bin ralphy --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="$(git describe --tags --always)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=ralphy-$version-${{ matrix.target_name }}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          name="${{ steps.version.outputs.name }}"
          stage="dist/$name"
          mkdir -p "$stage" out
          # The binary embeds its prompts and skills at build time, so it is
          # self-contained — these are the docs a user needs alongside it.
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$stage/"
          cp README.md LICENSE docs/BUILDING.md "$stage/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ( cd dist && 7z a -tzip "../out/$name.zip" "$name" >/dev/null )
            archive="$name.zip"
          else
            # tar preserves the executable bit so the user can run it directly.
            tar -czf "out/$name.tar.gz" -C dist "$name"
            archive="$name.tar.gz"
          fi
          # macOS ships `shasum -a 256`, not the `sha256sum` Linux/Windows have;
          # both emit the same `<hash>  <file>` format `sha256sum -c` verifies.
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd out && sha256sum "$archive" > "$archive.sha256" )
          else
            ( cd out && shasum -a 256 "$archive" > "$archive.sha256" )
          fi
          ls -l out

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target_name }}
          path: out/

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/}"
          ls -l out
          # A semver pre-release tag (contains a hyphen, e.g. v0.1.0-rc1) is
          # published as a GitHub pre-release so it is not flagged "Latest".
          prerelease_flag=""
          if [[ "$version" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$version" out/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$version" \
            --generate-notes \
            $prerelease_flag
