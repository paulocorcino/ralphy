name: Release

on:
  push:
    tags:
      - "v*"
  # Allow building a release zip on demand (uploaded as a run artifact only;
  # no GitHub Release is published unless triggered by a tag).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  package:
    name: Build and package windows-x64 zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin ralphy

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF -replace '^refs/tags/', ''
          } else {
            $version = git describe --tags --always
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=ralphy-$version-windows-x64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage release files
        shell: pwsh
        run: |
          $stage = "dist/${{ steps.version.outputs.name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # The binary embeds its prompts and skills at build time, so it is
          # self-contained — these are the docs a user needs alongside it.
          Copy-Item "target/release/ralphy.exe" $stage
          Copy-Item "README.md"                 $stage
          Copy-Item "LICENSE"                    $stage
          Copy-Item "docs/BUILDING.md"           $stage
          Get-ChildItem $stage

      - name: Create zip
        shell: pwsh
        run: |
          $name = "${{ steps.version.outputs.name }}"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip" -Force
          Get-FileHash "dist/$name.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $name.zip" } |
            Out-File -FilePath "dist/$name.zip.sha256" -Encoding ascii

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}
          path: |
            dist/${{ steps.version.outputs.name }}.zip
            dist/${{ steps.version.outputs.name }}.zip.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $name = "${{ steps.version.outputs.name }}"
          $version = "${{ steps.version.outputs.version }}"
          gh release create $version `
            "dist/$name.zip" `
            "dist/$name.zip.sha256" `
            --title $version `
            --generate-notes
