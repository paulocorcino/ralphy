<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ralphy daemon — login</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; place-items: center;
    font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; padding: 24px;
  }
  form {
    width: 100%; max-width: 22rem; display: flex; flex-direction: column; gap: 1rem;
    background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px;
  }
  h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
  label { display: flex; flex-direction: column; gap: .35rem; font-size: .85rem; color: #9da7b3; }
  input {
    font-size: 1.25rem; padding: .6rem .7rem; border-radius: 8px;
    border: 1px solid #30363d; background: #0d1117; color: #e6edf3; width: 100%;
  }
  input:focus { outline: 2px solid #2f81f7; border-color: #2f81f7; }
  button {
    font-size: 1rem; font-weight: 600; padding: .7rem; border: 0; border-radius: 8px;
    background: #238636; color: #fff; cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  .err { min-height: 1.2em; color: #f85149; font-size: .85rem; }
</style>
</head>
<body>
  <form id="login" autocomplete="off">
    <h1>ralphy daemon</h1>
    <label>
      Authenticator code
      <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9]*" maxlength="6" required autofocus />
    </label>
    <label>
      Password <span style="opacity:.6">(if set)</span>
      <input id="password" name="password" type="password" autocomplete="current-password" />
    </label>
    <button id="submit" type="submit">Log in</button>
    <div class="err" id="err" role="alert"></div>
  </form>
<script>
  const form = document.getElementById('login');
  const err = document.getElementById('err');
  const btn = document.getElementById('submit');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    const body = new URLSearchParams();
    body.set('code', document.getElementById('code').value.trim());
    const pw = document.getElementById('password').value;
    if (pw) body.set('password', pw);
    try {
      const resp = await fetch('/api/login', { method: 'POST', body });
      if (resp.ok) { window.location.assign('/'); return; }
      err.textContent = resp.status === 401 ? 'Invalid code or password.' : 'Login unavailable.';
    } catch {
      err.textContent = 'Network error — try again.';
    }
    btn.disabled = false;
  });
</script>
</body>
</html>
