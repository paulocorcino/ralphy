<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ralphy daemon</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #14110f;
        color: #e8e2d9;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        text-align: center;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      p {
        color: #9b948a;
      }
      h1.offline {
        opacity: 0.4;
      }
      #status {
        color: #9b948a;
        min-height: 1.2em;
      }
      #status.offline {
        color: #c56b5c;
      }
      #repos {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0 0;
        text-align: left;
        display: inline-block;
      }
      #repos li {
        padding: 0.15rem 0;
      }
      #repos li.unreachable {
        opacity: 0.45;
      }
      #repos .slug {
        font-weight: 600;
      }
      #repos .path {
        color: #9b948a;
        margin-left: 0.6rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="ident">ralphy daemon</h1>
      <p id="status">connecting…</p>
      <p>The resident process is up. Workbench sessions arrive in a later slice.</p>
      <ul id="repos"></ul>
    </main>
    <script>
      // Identity is delivered at runtime (the embedded HTML bakes in none):
      // render "avatar name" when the daemon has been baptized, else leave the
      // default heading.
      fetch("/api/identity")
        .then((r) => (r.ok ? r.json() : null))
        .then((id) => {
          if (id) {
            document.getElementById("ident").textContent =
              `${id.avatar} ${id.name}`;
          }
        })
        .catch(() => {});

      // Live presence over the daemon's WebSocket: the heartbeat carries the
      // identity and uptime, and its silence is how the page detects the daemon
      // dying. Mirror of the Rust codec (src/protocol.rs): tag byte 0x03 =
      // presence, rest is JSON.
      const ident = document.getElementById("ident");
      const status = document.getElementById("status");
      let watchdog = null;

      function markOffline() {
        ident.classList.add("offline");
        status.classList.add("offline");
        status.textContent = "daemon offline";
      }

      function fmtUptime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h ? `${h}h ${m}m` : m ? `${m}m ${sec}s` : `${sec}s`;
      }

      function onPresence(p) {
        ident.classList.remove("offline");
        status.classList.remove("offline");
        if (p.name) ident.textContent = `${p.avatar ?? ""} ${p.name}`.trim();
        status.textContent = `up ${fmtUptime(p.uptime_secs)}`;
        // Three missed 2s beats (6s) of silence ⇒ presume the daemon dead.
        clearTimeout(watchdog);
        watchdog = setTimeout(markOffline, 6000);
      }

      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.binaryType = "arraybuffer";
      ws.onmessage = (ev) => {
        const a = new Uint8Array(ev.data);
        if (a[0] === 3) {
          try {
            onPresence(JSON.parse(new TextDecoder().decode(a.subarray(1))));
          } catch {}
        }
      };
      ws.onclose = markOffline;
      ws.onerror = markOffline;

      // Registered repos, refreshed from disk on each load. Unreachable repos
      // (a moved/deleted path) are greyed but retained — never dropped.
      fetch("/api/repos")
        .then((r) => (r.ok ? r.json() : []))
        .then((repos) => {
          const ul = document.getElementById("repos");
          if (!repos.length) {
            ul.innerHTML = "<li>no repos registered yet</li>";
            return;
          }
          for (const repo of repos) {
            const li = document.createElement("li");
            if (!repo.reachable) li.className = "unreachable";
            const slug = document.createElement("span");
            slug.className = "slug";
            slug.textContent = repo.slug;
            const path = document.createElement("span");
            path.className = "path";
            path.textContent = repo.path;
            li.append(slug, path);
            ul.append(li);
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
