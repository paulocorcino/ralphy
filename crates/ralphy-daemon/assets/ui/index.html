<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ralphy daemon</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #14110f;
        color: #e8e2d9;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        text-align: center;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      p {
        color: #9b948a;
      }
      h1.offline {
        opacity: 0.4;
      }
      #status {
        color: #9b948a;
        min-height: 1.2em;
      }
      #status.offline {
        color: #c56b5c;
      }
      #repos {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0 0;
        text-align: left;
        display: inline-block;
      }
      #repos li {
        padding: 0.15rem 0;
      }
      #repos li.unreachable {
        opacity: 0.45;
      }
      #repos .slug {
        font-weight: 600;
      }
      #repos .path {
        color: #9b948a;
        margin-left: 0.6rem;
      }
      #repos .agents {
        margin-left: 0.6rem;
        display: inline-flex;
        gap: 0.3rem;
      }
      #repos button.tile {
        font: inherit;
        font-size: 0.8rem;
        color: #e8e2d9;
        background: #241f1b;
        border: 1px solid #3a332d;
        border-radius: 4px;
        padding: 0.1rem 0.5rem;
        cursor: pointer;
      }
      #repos button.tile:hover {
        background: #322b25;
      }
      #repos li.unreachable button.tile {
        pointer-events: none;
      }
      #repos .cmd-status {
        color: #9b948a;
        margin-left: 0.6rem;
        font-size: 0.8rem;
      }
      /* Live output of a UI-fired run (issue #180): scrollable monospace pane,
         hidden until the first command streams into it. */
      #repos .cmd-log {
        display: none;
        margin: 0.4rem 0 0;
        max-height: 12rem;
        overflow: auto;
        padding: 0.5rem 0.6rem;
        background: #1a1613;
        color: #cfc8bd;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 0.78rem;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 4px;
      }
      /* The free console (issue #167): a deliberate escape hatch, styled apart
         from the curated repo×agent tiles so it never reads as the default
         click path. */
      button.console-tile {
        font: inherit;
        font-size: 0.8rem;
        color: #e8d9a8;
        background: #2b2410;
        border: 1px solid #5a4a1e;
        border-radius: 4px;
        padding: 0.1rem 0.5rem;
        cursor: pointer;
        margin-left: 0.6rem;
      }
      button.console-tile:hover {
        background: #3a3016;
      }
      #console-escape-hatch {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px dashed #3a332d;
      }
      #console-escape-hatch h2 {
        font-size: 0.85rem;
        font-weight: 600;
        color: #9b948a;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin: 0 0 0.4rem;
      }
      /* Live sessions render as FLOATING, draggable windows layered over the
         launcher (which stays visible, so more can be spawned without leaving).
         The daemon already owns N concurrent sessions (the tmux model, #166);
         each window is one attachment to a distinct session id. */
      #workspace {
        position: fixed;
        inset: 0;
        pointer-events: none; /* the layer is click-through… */
        z-index: 50;
      }
      .session-window {
        position: fixed;
        pointer-events: auto; /* …but each window itself is interactive */
        display: flex;
        flex-direction: column;
        background: #000;
        border: 1px solid #3a332d;
        border-radius: 6px;
        overflow: hidden;
        box-sizing: border-box;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        min-width: 240px;
        min-height: 160px;
      }
      .session-window.focused {
        border-color: #6b5f52;
      }
      .session-titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0.6rem;
        background: #241f1b;
        border-bottom: 1px solid #3a332d;
        flex-shrink: 0;
        cursor: move; /* the title bar is the drag handle */
        user-select: none;
      }
      .session-title {
        color: #9b948a;
        font-size: 0.85rem;
      }
      .session-actions {
        display: flex;
        gap: 0.4rem;
      }
      .session-actions button {
        font: inherit;
        font-size: 0.8rem;
        color: #e8e2d9;
        background: #241f1b;
        border: 1px solid #3a332d;
        border-radius: 4px;
        padding: 0.1rem 0.5rem;
        cursor: pointer;
      }
      .session-actions button:hover {
        background: #322b25;
      }
      .session-actions button.session-close {
        color: #c56b5c;
        border-color: #5a2e28;
      }
      .session-body {
        flex: 1 1 auto;
        min-height: 0;
      }
      /* A grab corner for resizing; the diagonal hatch hints the affordance. */
      .session-resize {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        background: linear-gradient(
          135deg,
          transparent 55%,
          #6b5f52 55%,
          #6b5f52 63%,
          transparent 63%,
          transparent 74%,
          #6b5f52 74%,
          #6b5f52 82%,
          transparent 82%
        );
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="ident">ralphy daemon</h1>
      <p id="status">connecting…</p>
      <p>The resident process is up. Launch a session, or reattach a live one.</p>
      <ul id="sessions"></ul>
      <ul id="repos"></ul>
      <section id="console-escape-hatch">
        <h2>escape hatch — free console</h2>
        <button class="console-tile" id="home-console-btn">open a free console (home dir)</button>
      </section>
    </main>
    <div id="workspace"></div>
    <script src="vendor/xterm.js"></script>
    <script src="vendor/xterm-addon-fit.js"></script>
    <script src="vendor/xterm-addon-webgl.js"></script>
    <script src="vendor/xterm-addon-web-links.js"></script>
    <script>
      // Identity is delivered at runtime (the embedded HTML bakes in none):
      // render "avatar name" when the daemon has been baptized, else leave the
      // default heading.
      fetch("/api/identity")
        .then((r) => (r.ok ? r.json() : null))
        .then((id) => {
          if (id) {
            document.getElementById("ident").textContent =
              `${id.avatar} ${id.name}`;
          }
        })
        .catch(() => {});

      // Live presence over the daemon's WebSocket: the heartbeat carries the
      // identity and uptime, and its silence is how the page detects the daemon
      // dying. Mirror of the Rust codec (src/protocol.rs): tag byte 0x03 =
      // presence, rest is JSON.
      const ident = document.getElementById("ident");
      const status = document.getElementById("status");
      let watchdog = null;

      function markOffline() {
        ident.classList.add("offline");
        status.classList.add("offline");
        status.textContent = "daemon offline";
      }

      function fmtUptime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h ? `${h}h ${m}m` : m ? `${m}m ${sec}s` : `${sec}s`;
      }

      function onPresence(p) {
        ident.classList.remove("offline");
        status.classList.remove("offline");
        if (p.name) ident.textContent = `${p.avatar ?? ""} ${p.name}`.trim();
        status.textContent = `up ${fmtUptime(p.uptime_secs)}`;
        // Three missed 2s beats (6s) of silence ⇒ presume the daemon dead.
        clearTimeout(watchdog);
        watchdog = setTimeout(markOffline, 6000);
      }

      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.binaryType = "arraybuffer";
      ws.onmessage = (ev) => {
        const a = new Uint8Array(ev.data);
        if (a[0] === 3) {
          try {
            onPresence(JSON.parse(new TextDecoder().decode(a.subarray(1))));
          } catch {}
        }
      };
      ws.onclose = markOffline;
      ws.onerror = markOffline;

      // The workbench session codec, mirrored from src/protocol.rs. A terminal
      // frame is [0x01][session u64 BE][raw bytes]; a resize rides a command
      // frame [0x02][JSON {id, verb:"resize", payload:{rows, cols}}]. One session
      // at a time in this slice, so the session id is always 1.
      const AGENTS = ["claude", "codex", "opencode"];
      const TAG_TERMINAL = 0x01;
      const TAG_COMMAND = 0x02;
      const SESSION_ID = 1;

      function encodeTerminal(str) {
        const data = new TextEncoder().encode(str);
        const out = new Uint8Array(1 + 8 + data.length);
        out[0] = TAG_TERMINAL;
        // session id as a big-endian u64; only the low byte is ever non-zero.
        out[8] = SESSION_ID;
        out.set(data, 9);
        return out;
      }

      function encodeResize(rows, cols) {
        const json = JSON.stringify({
          id: 0,
          verb: "resize",
          payload: { rows, cols },
        });
        const body = new TextEncoder().encode(json);
        const out = new Uint8Array(1 + body.length);
        out[0] = TAG_COMMAND;
        out.set(body, 1);
        return out;
      }

      // The remote-trigger verbs (src/dispatch.rs): each maps to a blessed
      // `ralphy` invocation server-side. The button sends only the verb name;
      // the client never composes a command line.
      const COMMANDS = ["run", "triage", "push"];

      function encodeCommand(verb, repo) {
        const json = JSON.stringify({
          id: 1,
          verb,
          payload: { repo },
        });
        const body = new TextEncoder().encode(json);
        const out = new Uint8Array(1 + body.length);
        out[0] = TAG_COMMAND;
        out.set(body, 1);
        return out;
      }

      // Fire one remote command: open a dedicated `/ws/command` socket, send the
      // verb, and reflect each reply frame (spawn ack → exit / error) into the
      // repo's status span. One command per connection (mirror of the server).
      function sendCommand(slug, verb, statusEl, logEl) {
        statusEl.textContent = `${verb}: …`;
        // Reset the log pane for this fresh run and reveal it (issue #180).
        logEl.textContent = "";
        logEl.style.display = "block";
        const ws = new WebSocket(`ws://${location.host}/ws/command`);
        ws.binaryType = "arraybuffer";
        ws.onopen = () => ws.send(encodeCommand(verb, slug));
        ws.onmessage = (ev) => {
          const a = new Uint8Array(ev.data);
          if (a[0] !== TAG_COMMAND) return;
          let p;
          try {
            p = JSON.parse(new TextDecoder().decode(a.subarray(1))).payload;
          } catch {
            return;
          }
          if (p.status === "spawned") {
            statusEl.textContent = `${verb}: spawned pid ${p.pid}`;
          } else if (p.status === "output") {
            // Append the live chunk and keep the newest line in view.
            logEl.textContent += p.chunk;
            logEl.scrollTop = logEl.scrollHeight;
          } else if (p.status === "exited") {
            statusEl.textContent = `${verb}: exited code ${p.code}`;
          } else if (p.status === "error") {
            statusEl.textContent = `${verb}: error ${p.message}`;
          }
        };
        ws.onerror = () => {
          statusEl.textContent = `${verb}: connection error`;
        };
      }

      // --- floating-window chrome -------------------------------------------
      // Multiple sessions coexist as draggable/resizable windows (the daemon
      // already owns them concurrently). `zTop` is the running stacking order and
      // `cascade` offsets each new window so they don't land exactly on top.
      const workspace = document.getElementById("workspace");
      let zTop = 60;
      let cascade = 0;

      // Raise `win` above every other window and mark it the focused one.
      function focusWindow(win) {
        zTop += 1;
        win.style.zIndex = zTop;
        for (const w of workspace.querySelectorAll(".session-window.focused")) {
          if (w !== win) w.classList.remove("focused");
        }
        win.classList.add("focused");
      }

      // Drag `win` by `handle` (its title bar), except when the pointer lands on
      // a control button (detach/close must still click, not drag).
      function makeDraggable(win, handle) {
        handle.addEventListener("mousedown", (e) => {
          if (e.target.closest("button")) return;
          focusWindow(win);
          const rect = win.getBoundingClientRect();
          const offX = e.clientX - rect.left;
          const offY = e.clientY - rect.top;
          const onMove = (ev) => {
            win.style.left = Math.max(0, ev.clientX - offX) + "px";
            win.style.top = Math.max(0, ev.clientY - offY) + "px";
          };
          const onUp = () => {
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
          };
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
          e.preventDefault();
        });
      }

      // Resize `win` from its bottom-right `handle`; the terminal refits via a
      // ResizeObserver on the body, so no extra callback is needed here.
      function makeResizable(win, handle) {
        handle.addEventListener("mousedown", (e) => {
          focusWindow(win);
          const rect = win.getBoundingClientRect();
          const startX = e.clientX;
          const startY = e.clientY;
          const startW = rect.width;
          const startH = rect.height;
          const onMove = (ev) => {
            win.style.width = Math.max(240, startW + ev.clientX - startX) + "px";
            win.style.height =
              Math.max(160, startH + ev.clientY - startY) + "px";
          };
          const onUp = () => {
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
          };
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
          e.preventDefault();
        });
      }

      // Launch or reattach a session into a NEW floating window: build the window
      // chrome, open the session WebSocket, and wire keystrokes/resize out and PTY
      // bytes in. xterm.js is the terminal emulator, so it answers the child's
      // startup cursor-position request itself — the daemon stays a transparent
      // byte pipe. `opts` is one of: {repo, agent} (a NEW agent launch),
      // {console: true[, repo]} (a NEW free-console launch, #167 — home dir when
      // `repo` is absent), or {id[, takeover]} (a REATTACH to a daemon-owned
      // session, #166). Each call is independent, so N windows run side by side.
      function launch(opts) {
        const win = document.createElement("div");
        win.className = "session-window";
        cascade = (cascade + 1) % 8;
        win.style.left = 44 + cascade * 26 + "px";
        win.style.top = 44 + cascade * 26 + "px";
        win.style.width = "min(760px, 82vw)";
        win.style.height = "min(460px, 72vh)";

        const titlebar = document.createElement("div");
        titlebar.className = "session-titlebar";
        const title = document.createElement("span");
        title.className = "session-title";
        const label = opts.repo
          ? `${opts.repo} · ${opts.agent ?? (opts.console ? "console" : "session")}`
          : opts.id != null
            ? `id ${opts.id}`
            : opts.console
              ? "console"
              : "session";
        title.textContent = label;
        const actions = document.createElement("span");
        actions.className = "session-actions";
        const detachBtn = document.createElement("button");
        detachBtn.textContent = "detach";
        const closeBtn = document.createElement("button");
        closeBtn.className = "session-close";
        closeBtn.textContent = "close";
        actions.append(detachBtn, closeBtn);
        titlebar.append(title, actions);
        const body = document.createElement("div");
        body.className = "session-body";
        const resizeGrip = document.createElement("div");
        resizeGrip.className = "session-resize";
        win.append(titlebar, body, resizeGrip);
        workspace.append(win);

        win.addEventListener("mousedown", () => focusWindow(win));
        makeDraggable(win, titlebar);
        makeResizable(win, resizeGrip);
        focusWindow(win);

        let currentSessionId = opts.id ?? null;
        let leaving = false;

        const term = new Terminal({ convertEol: false });
        const fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.open(body);
        // GPU-accelerated glyph rendering. The DOM renderer stays the fallback:
        // if WebGL is unavailable (headless, no GPU) or the context is lost
        // (e.g. Chromium/Nvidia on OS resume), dispose the addon and xterm
        // falls back to DOM without dropping the session.
        try {
          const webgl = new WebglAddon.WebglAddon();
          webgl.onContextLoss(() => webgl.dispose());
          term.loadAddon(webgl);
        } catch {}
        // Make URLs in the child's output clickable (GitHub issues/PRs, docs).
        term.loadAddon(new WebLinksAddon.WebLinksAddon());
        fit.fit();
        // Refit whenever THIS window's body changes size (drag-resize or a
        // viewport change), so the child's TUI reflows to the window, not the
        // screen. Per-window, so one window's resize never disturbs another.
        const ro = new ResizeObserver(() => {
          try {
            fit.fit();
          } catch {}
        });
        ro.observe(body);

        function returnToLauncher() {
          leaving = true;
          ro.disconnect();
          term.dispose();
          win.remove();
          refreshSessions();
        }

        let url = "ws://" + location.host + "/ws/session?";
        if (opts.id != null) {
          url += "id=" + encodeURIComponent(opts.id);
          if (opts.takeover) url += "&takeover=1";
        } else if (opts.console) {
          url += "console=1";
          if (opts.repo) url += "&repo=" + encodeURIComponent(opts.repo);
        } else {
          url +=
            "repo=" +
            encodeURIComponent(opts.repo) +
            "&agent=" +
            encodeURIComponent(opts.agent);
        }
        const ws = new WebSocket(url);
        ws.binaryType = "arraybuffer";
        let opened = false;
        ws.onopen = () => {
          opened = true;
          fit.fit();
          ws.send(encodeResize(term.rows, term.cols));
        };
        ws.onmessage = (ev) => {
          const a = new Uint8Array(ev.data);
          if (a[0] === TAG_TERMINAL) {
            if (currentSessionId == null) {
              currentSessionId = Number(
                new DataView(a.buffer, a.byteOffset + 1, 8).getBigUint64(0),
              );
            }
            term.write(a.subarray(9));
          }
        };
        term.onData((d) => {
          if (ws.readyState === WebSocket.OPEN) ws.send(encodeTerminal(d));
        });
        term.onResize(({ rows, cols }) => {
          if (ws.readyState === WebSocket.OPEN)
            ws.send(encodeResize(rows, cols));
        });

        detachBtn.onclick = () => {
          if (
            ws.readyState === WebSocket.OPEN ||
            ws.readyState === WebSocket.CONNECTING
          )
            ws.close();
          returnToLauncher();
        };
        closeBtn.onclick = () => {
          const id = currentSessionId;
          const done = () => {
            if (ws.readyState <= 1) ws.close();
            returnToLauncher();
          };
          if (id != null) {
            fetch(`/api/sessions/close?id=${id}`, { method: "POST" }).then(
              done,
              done,
            );
          } else {
            done();
          }
        };

        ws.onclose = () => {
          if (leaving) return;
          // A reattach that closes WITHOUT ever opening is the server refusing a
          // busy session (409 before the upgrade — a single writer is attached).
          // Offer an explicit takeover, once.
          if (opts.id != null && !opened && !opts.takeover) {
            if (confirm("session busy — take over?")) {
              // Tear THIS window down and relaunch as a takeover, so no dead
              // empty window lingers.
              leaving = true;
              ro.disconnect();
              term.dispose();
              win.remove();
              launch({ id: opts.id, takeover: true });
              return;
            }
          }
          term.write("\r\n[session closed]\r\n");
        };
      }

      // Live sessions (the tmux model, #166): each survives its browser tab, so a
      // reconnecting client lists them, reattaches (replaying scrollback then
      // streaming live), or closes them. Refreshed on load and after a close.
      function fmtStarted(secs) {
        try {
          return new Date(secs * 1000).toLocaleTimeString();
        } catch {
          return "";
        }
      }

      function refreshSessions() {
        fetch("/api/sessions")
          .then((r) => (r.ok ? r.json() : []))
          .then((sessions) => {
            const ul = document.getElementById("sessions");
            ul.innerHTML = "";
            for (const s of sessions) {
              const li = document.createElement("li");
              const label = document.createElement("span");
              label.className = "slug";
              label.textContent = `${s.repo} · ${s.agent}`;
              const when = document.createElement("span");
              when.className = "path";
              when.textContent = `started ${fmtStarted(s.started_at)}`;
              const controls = document.createElement("span");
              controls.className = "agents";
              const reattach = document.createElement("button");
              reattach.className = "tile";
              reattach.textContent = "reattach";
              reattach.onclick = () => launch({ id: s.id });
              const close = document.createElement("button");
              close.className = "tile";
              close.textContent = "close";
              close.onclick = () => {
                fetch(`/api/sessions/close?id=${s.id}`, { method: "POST" }).then(
                  refreshSessions,
                );
              };
              controls.append(reattach, close);
              li.append(label, when, controls);
              ul.append(li);
            }
          })
          .catch(() => {});
      }

      refreshSessions();

      // The standalone escape-hatch launcher (#167): a free console at the
      // daemon's home directory, no repo chosen.
      document
        .getElementById("home-console-btn")
        .addEventListener("click", () => launch({ console: true }));

      // Registered repos, refreshed from disk on each load. Unreachable repos
      // (a moved/deleted path) are greyed but retained — never dropped. Each
      // reachable repo gets a launch tile per agent (zero typing to launch).
      fetch("/api/repos")
        .then((r) => (r.ok ? r.json() : []))
        .then((repos) => {
          const ul = document.getElementById("repos");
          if (!repos.length) {
            ul.innerHTML = "<li>no repos registered yet</li>";
            return;
          }
          for (const repo of repos) {
            const li = document.createElement("li");
            if (!repo.reachable) li.className = "unreachable";
            const slug = document.createElement("span");
            slug.className = "slug";
            slug.textContent = repo.slug;
            const path = document.createElement("span");
            path.className = "path";
            path.textContent = repo.path;
            const agents = document.createElement("span");
            agents.className = "agents";
            for (const agent of AGENTS) {
              const btn = document.createElement("button");
              btn.className = "tile";
              btn.textContent = agent;
              btn.onclick = () => launch({ repo: repo.slug, agent });
              agents.append(btn);
            }
            // A per-repo free console (#167): visually distinct from the
            // curated agent tiles above, and never the default click path.
            const consoleBtn = document.createElement("button");
            consoleBtn.className = "console-tile";
            consoleBtn.textContent = "console";
            consoleBtn.onclick = () => launch({ console: true, repo: repo.slug });
            agents.append(consoleBtn);
            // Per-repo remote-trigger buttons + an inline status span reporting
            // the spawn ack then the child's exit (or an error).
            const commands = document.createElement("span");
            commands.className = "agents";
            const cmdStatus = document.createElement("span");
            cmdStatus.className = "cmd-status";
            // The live output pane for a UI-fired run (issue #180): hidden until
            // the first command streams into it.
            const cmdLog = document.createElement("pre");
            cmdLog.className = "cmd-log";
            for (const verb of COMMANDS) {
              const btn = document.createElement("button");
              btn.className = "tile";
              btn.textContent = verb;
              btn.onclick = () => sendCommand(repo.slug, verb, cmdStatus, cmdLog);
              commands.append(btn);
            }
            li.append(slug, path, agents, commands, cmdStatus, cmdLog);
            ul.append(li);
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
