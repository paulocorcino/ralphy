<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ralphy daemon</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #14110f;
        color: #e8e2d9;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        text-align: center;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      p {
        color: #9b948a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="ident">ralphy daemon</h1>
      <p>The resident process is up. Workbench sessions arrive in a later slice.</p>
    </main>
    <script>
      // Identity is delivered at runtime (the embedded HTML bakes in none):
      // render "avatar name" when the daemon has been baptized, else leave the
      // default heading.
      fetch("/api/identity")
        .then((r) => (r.ok ? r.json() : null))
        .then((id) => {
          if (id) {
            document.getElementById("ident").textContent =
              `${id.avatar} ${id.name}`;
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
