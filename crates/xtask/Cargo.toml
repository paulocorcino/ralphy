[package]
name = "xtask"
version = "0.0.0"
edition.workspace = true
license.workspace = true
publish = false

# Out-of-band repo tooling, not part of the shipped `ralphy` binary. No crate
# depends on it; it is run on demand via `cargo run -p xtask -- <cmd>` (ADR-0034
# A3: the seed floor is machine-generated by a checked-in tool, never build.rs).

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
ureq.workspace = true
